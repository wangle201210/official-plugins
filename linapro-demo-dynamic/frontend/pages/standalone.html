<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Plugin Standalone Page</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #eef4ff;
        --page-accent: #165dff;
        --page-accent-soft: rgba(22, 93, 255, 0.1);
        --page-text: #0f172a;
        --page-muted: #475569;
        --page-border: rgba(15, 23, 42, 0.08);
        --page-shadow: 0 32px 80px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(22, 93, 255, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(14, 165, 233, 0.16),
            transparent 26%
          ),
          linear-gradient(180deg, #f8fbff 0%, var(--page-bg) 100%);
        color: var(--page-text);
        font-family:
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC",
          sans-serif;
      }

      .page-shell {
        width: min(1080px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--page-border);
        border-radius: 28px;
        padding: 44px;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(246, 250, 255, 0.96) 100%
        );
        box-shadow: var(--page-shadow);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: -60px;
        top: -60px;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        background: radial-gradient(
          circle,
          rgba(22, 93, 255, 0.22) 0%,
          transparent 70%
        );
      }

      html[dir="rtl"] .hero::after {
        left: -60px;
        right: auto;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--page-accent-soft);
        color: var(--page-accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
      }

      h1 {
        margin: 18px 0 14px;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1.06;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 0;
        max-width: 720px;
        color: var(--page-muted);
        font-size: 18px;
        line-height: 1.9;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 20px;
        margin-top: 32px;
      }

      .summary-panel,
      .summary-card {
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(255, 255, 255, 0.78);
      }

      .summary-panel {
        padding: 22px;
      }

      .summary-panel h2,
      .summary-card h2 {
        margin: 0 0 14px;
        font-size: 16px;
      }

      .summary-list {
        display: grid;
        gap: 12px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .summary-list li {
        padding: 14px 16px;
        border-radius: 16px;
        background: #f8fafc;
      }

      .summary-list strong {
        display: block;
        margin-bottom: 4px;
        font-size: 15px;
      }

      .summary-list span {
        color: var(--page-muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .summary-card {
        padding: 22px;
      }

      .summary-card p {
        margin: 0;
        color: var(--page-muted);
        font-size: 14px;
        line-height: 1.85;
      }

      .summary-card + .summary-card {
        margin-top: 14px;
      }

      .footer-note {
        margin-top: 28px;
        color: #64748b;
        font-size: 13px;
        line-height: 1.8;
      }

      @media (max-width: 860px) {
        .page-shell {
          width: min(100vw - 24px, 1080px);
          padding: 20px 0 28px;
        }

        .hero {
          padding: 24px 18px;
          border-radius: 22px;
        }

        .hero-grid {
          grid-template-columns: 1fr;
        }

        .lead {
          font-size: 16px;
        }
      }
    </style>
    <script>
      const STANDALONE_MESSAGE_KEYS = {
        badge: "plugin.linapro-demo-dynamic.page.standalone.badge",
        card1Body: "plugin.linapro-demo-dynamic.page.standalone.card1Body",
        card1Title: "plugin.linapro-demo-dynamic.page.standalone.card1Title",
        card2Body: "plugin.linapro-demo-dynamic.page.standalone.card2Body",
        card2Title: "plugin.linapro-demo-dynamic.page.standalone.card2Title",
        footer: "plugin.linapro-demo-dynamic.page.standalone.footer",
        heroTitle: "plugin.linapro-demo-dynamic.page.standalone.heroTitle",
        lead: "plugin.linapro-demo-dynamic.page.standalone.lead",
        summary1Body: "plugin.linapro-demo-dynamic.page.standalone.summary1Body",
        summary1Title:
          "plugin.linapro-demo-dynamic.page.standalone.summary1Title",
        summary2Body: "plugin.linapro-demo-dynamic.page.standalone.summary2Body",
        summary2Title:
          "plugin.linapro-demo-dynamic.page.standalone.summary2Title",
        summary3Body: "plugin.linapro-demo-dynamic.page.standalone.summary3Body",
        summary3Title:
          "plugin.linapro-demo-dynamic.page.standalone.summary3Title",
        summaryTitle: "plugin.linapro-demo-dynamic.page.standalone.summaryTitle",
        title: "plugin.linapro-demo-dynamic.page.standalone.title",
      };

      const runtimeMessagesEndpoint = "/api/v1/i18n/runtime/messages";

      function isPlainObject(value) {
        return (
          typeof value === "object" && value !== null && !Array.isArray(value)
        );
      }

      function normalizeLocale(locale) {
        const normalized = String(locale || "").trim();
        const lowerLocale = normalized.toLowerCase();
        if (!lowerLocale) {
          return "en-US";
        }
        if (
          lowerLocale === "zh" ||
          lowerLocale === "zh-cn" ||
          lowerLocale === "zh-tw" ||
          lowerLocale === "zh-hk" ||
          lowerLocale === "zh-mo" ||
          lowerLocale.startsWith("zh-hant") ||
          lowerLocale.startsWith("zh-hans")
        ) {
          return "zh-CN";
        }
        if (lowerLocale.startsWith("en")) {
          return "en-US";
        }
        return normalized;
      }

      function resolveLocale() {
        const params = new URLSearchParams(window.location.search);
        const explicit = params.get("lang");
        return normalizeLocale(explicit || navigator.language || "");
      }

      function lookupRuntimeMessageString(messages, key) {
        let current = messages;
        for (const segment of key.split(".").filter(Boolean)) {
          if (!isPlainObject(current) || !(segment in current)) {
            return "";
          }
          current = current[segment];
        }
        return typeof current === "string" ? current : "";
      }

      function extractRuntimeMessagesPayload(payload) {
        if (!isPlainObject(payload)) {
          return {};
        }
        if (isPlainObject(payload.data?.messages)) {
          return payload.data.messages;
        }
        if (isPlainObject(payload.messages)) {
          return payload.messages;
        }
        return {};
      }

      function resolveStandaloneMessages(runtimeMessages) {
        const messages = {};
        if (!isPlainObject(runtimeMessages)) {
          return messages;
        }
        for (const [targetKey, runtimeKey] of Object.entries(
          STANDALONE_MESSAGE_KEYS,
        )) {
          const directValue = runtimeMessages[targetKey];
          const runtimeValue =
            typeof directValue === "string"
              ? directValue
              : lookupRuntimeMessageString(runtimeMessages, runtimeKey);
          if (runtimeValue) {
            messages[targetKey] = runtimeValue;
          }
        }
        return messages;
      }

      function hasCompleteStandaloneMessages(messages) {
        return Object.keys(STANDALONE_MESSAGE_KEYS).every(
          (key) => typeof messages[key] === "string" && messages[key],
        );
      }

      function consumeRuntimeMessages(locale) {
        const params = new URLSearchParams(window.location.search);
        const key = params.get("i18nKey");
        if (!key) {
          return null;
        }

        try {
          const rawPayload = window.localStorage.getItem(key);
          window.localStorage.removeItem(key);
          if (!rawPayload) {
            return null;
          }
          const payload = JSON.parse(rawPayload);
          if (payload?.locale !== locale || !payload?.messages) {
            return null;
          }
          return payload.messages;
        } catch (_error) {
          return null;
        }
      }

      async function fetchRuntimeMessages(locale) {
        try {
          const url = `${runtimeMessagesEndpoint}?lang=${encodeURIComponent(
            locale,
          )}`;
          const response = await fetch(url, {
            headers: {
              Accept: "application/json",
            },
          });
          if (!response.ok) {
            return {};
          }
          return extractRuntimeMessagesPayload(await response.json());
        } catch (_error) {
          return {};
        }
      }

      function applyMessages(messages) {
        document.title = messages.title || "Dynamic Plugin Standalone Page";

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.getAttribute("data-i18n");
          element.textContent = key && messages[key] ? messages[key] : "";
        });
      }

      async function applyStandaloneLocale() {
        const locale = resolveLocale();
        document.documentElement.lang = locale;
        document.documentElement.dir = "ltr";

        const bridgedMessages = resolveStandaloneMessages(
          consumeRuntimeMessages(locale),
        );
        if (hasCompleteStandaloneMessages(bridgedMessages)) {
          applyMessages(bridgedMessages);
          return;
        }

        const fetchedMessages = resolveStandaloneMessages(
          await fetchRuntimeMessages(locale),
        );
        applyMessages({
          ...fetchedMessages,
          ...bridgedMessages,
        });
      }

      window.addEventListener("DOMContentLoaded", applyStandaloneLocale);
    </script>
  </head>
  <body>
    <div class="page-shell">
      <main class="hero" data-testid="linapro-demo-dynamic-standalone">
        <span class="badge" data-i18n="badge"></span>
        <h1 data-i18n="heroTitle"></h1>
        <p class="lead" data-i18n="lead"></p>

        <section class="hero-grid">
          <div class="summary-panel">
            <h2 data-i18n="summaryTitle"></h2>
            <ul class="summary-list">
              <li>
                <strong data-i18n="summary1Title"></strong>
                <span data-i18n="summary1Body"></span>
              </li>
              <li>
                <strong data-i18n="summary2Title"></strong>
                <span data-i18n="summary2Body"></span>
              </li>
              <li>
                <strong data-i18n="summary3Title"></strong>
                <span data-i18n="summary3Body"></span>
              </li>
            </ul>
          </div>

          <div>
            <section class="summary-card">
              <h2 data-i18n="card1Title"></h2>
              <p data-i18n="card1Body"></p>
            </section>
            <section class="summary-card">
              <h2 data-i18n="card2Title"></h2>
              <p data-i18n="card2Body"></p>
            </section>
          </div>
        </section>

        <p class="footer-note" data-i18n="footer"></p>
      </main>
    </div>
  </body>
</html>
