id: cms
name: Content - CMS
version: v0.1.0
type: source
scope_nature: platform_only
supports_multi_tenant: false
default_install_mode: global
description: Official source CMS plugin for site settings, categories, articles, messages, and public content APIs.
author: linapro
license: Apache-2.0
i18n:
  enabled: true
  default: en-US
  locales:
    - locale: en-US
      nativeName: English
    - locale: zh-CN
      nativeName: 简体中文
    - locale: zh-TW
      nativeName: 繁體中文
menus:
