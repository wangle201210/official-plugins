# Reference OpenResty server block for publishing the CMS public site at a
# dedicated root domain while the LinaPro backend keeps serving it at /cms-site.
server {
    listen 80;
    server_name cms.example.com;
    index index.html index.htm;

    access_log /www/sites/cms.example.com/log/access.log main;
    error_log /www/sites/cms.example.com/log/error.log;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    proxy_set_header Accept-Encoding "";
    proxy_redirect off;

    location ^~ /.well-known/acme-challenge {
        allow all;
        root /usr/share/nginx/html;
    }

    location = /cms-site {
        return 301 /;
    }

    location ^~ /cms-site/ {
        rewrite ^/cms-site/?(.*)$ /$1 permanent;
    }

    location = / {
        proxy_pass http://127.0.0.1:9120/cms-site;
        sub_filter_once off;
        sub_filter_types text/css application/javascript text/javascript;
        sub_filter "/cms-site/" "/";
        sub_filter "/cms-site" "/";
    }

    location / {
        proxy_pass http://127.0.0.1:9120/cms-site/;
        sub_filter_once off;
        sub_filter_types text/css application/javascript text/javascript;
        sub_filter "/cms-site/" "/";
        sub_filter "/cms-site" "/";
    }
}
