{include file=comm/head.html}
<link rel="stylesheet" href="{site:assets}/css/yx-page.css">
<div class="container" data-testid="cms-public-site" data-template="single">
  <div class="breadcrumb">
    {page:breadcrumb separator='<span class="sep">&gt;</span>'}
  </div>
  <div class="page-content">
    {include file=comm/categorynav.html}
    <div class="content-area">
      <div class="article-detail" data-testid="cms-public-article-detail">
        <div class="article-detail-header">
          <h1>{article:title}</h1>
        </div>
        <div class="article-body">
          {article:content}
        </div>
      </div>
    </div>
  </div>
</div>
{include file=comm/foot.html}
