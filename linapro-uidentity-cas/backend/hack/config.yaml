# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: "pgsql:postgres:postgres@tcp(127.0.0.1:5432)/linapro?sslmode=disable"
        path: "internal"
        tables: "plugin_linapro_uidentity_cas_account,plugin_linapro_uidentity_cas_account_detail,plugin_linapro_uidentity_cas_group,plugin_linapro_uidentity_cas_unit,plugin_linapro_uidentity_cas_container,plugin_linapro_uidentity_cas_application,plugin_linapro_uidentity_cas_account_group,plugin_linapro_uidentity_cas_account_unit,plugin_linapro_uidentity_cas_account_app_role,plugin_linapro_uidentity_cas_account_app_blacklist,plugin_linapro_uidentity_cas_group_app_blacklist,plugin_linapro_uidentity_cas_pass_rule,plugin_linapro_uidentity_cas_sms,plugin_linapro_uidentity_cas_cas_login_log,plugin_linapro_uidentity_cas_oauth_log,plugin_linapro_uidentity_cas_oauth_token,plugin_linapro_uidentity_cas_account_change_log,plugin_linapro_uidentity_cas_account_active_log,plugin_linapro_uidentity_cas_sys_job,plugin_linapro_uidentity_cas_job_log"
        removePrefix: "plugin_linapro_uidentity_cas_"
        importPrefix: "lina-plugin-linapro-uidentity-cas/backend/internal"
        descriptionTag: true
        noModelComment: true
        stdTime: true
        typeMapping:
          timestamp:
            type: "*time.Time"
            import: time
          "timestamp without time zone":
            type: "*time.Time"
            import: time
          timestamptz:
            type: "*time.Time"
            import: time
          "timestamp with time zone":
            type: "*time.Time"
            import: time
